server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

services:
  restaurant:
    url: ${RESTAURANT_SERVICE_URL:http://restaurant-service:8082}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8084}

eureka:
  client:
    enabled: false

resilience4j:
  circuitbreaker:
    instances:
      restaurantService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      paymentService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      restaurantService:
        max-attempts: 3
        wait-duration: 1s
      paymentService:
        max-attempts: 3
        wait-duration: 1s
