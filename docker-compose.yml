services:
  postgres:
    image: postgres:17
    container_name: foodie-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - foodie-net

  auth-service:
    build: ./backend/auth-service
    container_name: foodie-auth
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foodie-net

  restaurant-service:
    build: ./backend/restaurant-service
    container_name: foodie-restaurant
    expose:
      - "8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restaurant_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - foodie-net

  order-service:
    build: ./backend/order-service
    container_name: foodie-order
    expose:
      - "8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foodie-net

  payment-service:
    build: ./backend/payment-service
    container_name: foodie-payment
    expose:
      - "8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foodie-net

  api-gateway:
    build: ./backend/api-gateway
    container_name: foodie-gateway
    expose:
      - "8080"
    depends_on:
      auth-service:
        condition: service_started
      restaurant-service:
        condition: service_healthy
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
    networks:
      - foodie-net

  frontend:
    build: ./frontend
    container_name: foodie-frontend
    expose:
      - "3000"
    environment:
      INTERNAL_API_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - foodie-net

  nginx:
    image: nginx:alpine
    container_name: foodie-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api-gateway
    networks:
      - foodie-net

networks:
  foodie-net:
    driver: bridge

volumes:
  pgdata:
